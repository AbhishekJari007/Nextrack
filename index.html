<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You ❤️</title>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
    
    <style>
        /* 1. iOS SYSTEM RESET & EXACT COLORS */
        :root {
            --ios-bg: #000000;
            --ios-card: rgba(28, 28, 30, 0.65);
            --ios-border: rgba(255, 255, 255, 0.12);
            --ios-text: #ffffff;
            --ios-subtext: rgba(235, 235, 245, 0.6);
            --ios-accent: #FF2D55; /* Official Apple Music Pink/Red */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            /* Uses native Apple font for UI, Serif for titles */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            /* svh ensures it fits perfectly even with browser address bars */
            height: 100svh; 
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. SUBTLE PREMIUM AMBIENT GLOW */
        .ambient-glow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; overflow: hidden;
        }
        .glow-1 {
            position: absolute; top: -10%; left: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(255,45,85,0.2) 0%, transparent 70%);
            filter: blur(50px); animation: drift 10s infinite alternate ease-in-out;
        }
        .glow-2 {
            position: absolute; bottom: -10%; right: -10%; width: 70vw; height: 70vw;
            background: radial-gradient(circle, rgba(100,10,30,0.3) 0%, transparent 70%);
            filter: blur(60px); animation: drift 12s infinite alternate-reverse ease-in-out;
        }
        @keyframes drift { 0% { transform: translate(0,0); } 100% { transform: translate(30px, 40px); } }

        /* 3. VIEW CONTROLLER (Smooth Screen Switching) */
        .view-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            display: flex; justify-content: center; align-items: center; padding: 20px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            transform: scale(0.96);
        }
        .active-view { opacity: 1; pointer-events: auto; transform: scale(1); }

        /* 4. TRUE iOS FROSTED GLASS CARD */
        .ios-glass-card {
            background: var(--ios-card);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid var(--ios-border);
            border-radius: 36px; /* Smooth Apple continuous curve */
            padding: 28px 24px;
            width: 100%;
            max-width: 375px;
            max-height: 90svh;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center; gap: 16px;
        }

        /* 5. TYPOGRAPHY */
        .title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 600; text-align: center; color: #fff; letter-spacing: 0.5px; }
        .title-small { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 500; font-style: italic; text-align: center; color: #fff; }
        .subtitle { font-size: 15px; color: var(--ios-subtext); text-align: center; font-weight: 400; letter-spacing: -0.2px; }
        .lyrics { font-family: 'Playfair Display', serif; font-style: italic; font-size: 16px; color: var(--ios-accent); text-align: center; opacity: 0.9; }

        /* 6. BUTTONS (Apple Style) */
        .ios-btn {
            border: none; border-radius: 20px; padding: 16px 24px; font-size: 16px; font-weight: 600;
            width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: transform 0.2s, opacity 0.2s; text-decoration: none; flex-shrink: 0;
            letter-spacing: -0.3px;
        }
        .ios-btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-primary { background: var(--ios-accent); color: white; box-shadow: 0 8px 24px rgba(255, 45, 85, 0.35); }
        .btn-secondary { background: rgba(255,255,255,0.08); color: white; }

        /* 7. ELEGANT TAP BUTTON */
        .tap-btn {
            width: 80px; height: 80px; background: var(--ios-accent);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            margin: 30px auto 20px; box-shadow: 0 0 30px rgba(255, 45, 85, 0.4);
            animation: softPulse 3s infinite ease-in-out; cursor: pointer;
        }
        @keyframes softPulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255,45,85,0.3); } 50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(255,45,85,0.6); } }

        /* 8. SLEEK LOADING ANIMATION */
        .pulse-loader {
            width: 50px; height: 50px;
            background: radial-gradient(circle, var(--ios-accent) 0%, transparent 70%);
            border-radius: 50%;
            animation: breathe 1.5s infinite ease-in-out;
            margin-bottom: 15px;
        }
        @keyframes breathe { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.5); opacity: 1; } }

        /* 9. VIDEO PLAYER (STRICT HEIGHT FOR PERFECT FIT) */
        .video-wrapper {
            width: 100%;
            height: 36svh; /* Locks the height perfectly */
            min-height: 240px;
            max-height: 340px;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex-shrink: 0;
            position: relative;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* 10. APPLE-STYLE SLIDER */
        .slider-container { width: 100%; text-align: left; margin: 4px 0; flex-shrink: 0; }
        .slider-label { font-size: 14px; color: var(--ios-subtext); margin-bottom: 10px; display: flex; justify-content: space-between; font-weight: 500; }
        input[type=range] {
            -webkit-appearance: none; width: 100%; background: rgba(255,255,255,0.1); height: 12px; border-radius: 6px; outline: none; overflow: hidden;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #fff;
            box-shadow: -400px 0 0 395px var(--ios-accent); cursor: pointer;
        }

        /* 11. REACTION BUTTON WRAPPER */
        #reaction-btn-wrapper { width: 100%; max-height: 0; opacity: 0; overflow: hidden; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); flex-shrink: 0; }
        #reaction-btn-wrapper.show { max-height: 100px; opacity: 1; margin-top: 4px; }

    </style>
</head>
<body>

    <!-- Subtle Premium Glow -->
    <div class="ambient-glow">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <!-- VIEW 1: INTRO SCREEN -->
    <div class="view-container active-view" id="view-intro">
        <div class="ios-glass-card" style="justify-content: center; padding: 50px 24px;">
            <div>
                <h1 class="title">Hello Beautiful</h1>
                <p class="subtitle" style="margin-top: 8px;">A special memory awaits</p>
            </div>
            
            <div class="tap-btn" onclick="startExperience()">
                <!-- Elegant White Heart SVG -->
                <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </div>

            <p class="subtitle" style="font-size: 12px; letter-spacing: 1px; text-transform: uppercase;">Tap to open</p>
        </div>
    </div>

    <!-- VIEW 2: LOADING SCREEN -->
    <div class="view-container" id="view-loading">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="pulse-loader"></div>
            <p class="subtitle" style="color: white; font-weight: 500;">Unlocking memory...</p>
        </div>
    </div>

    <!-- VIEW 3: MAIN CONTENT -->
    <div class="view-container" id="view-content">
        <div class="ios-glass-card">
            
            <div style="width: 100%;">
                <h2 class="title-small">For You... ❤️</h2>
                <p class="lyrics" style="margin-top: 6px;">"Whiskey or Vodka? Rehne do na nashe mein..."</p>
            </div>

            <!-- Video Player -->
            <div class="video-wrapper">
                <video id="mainVideo" controls playsinline webkit-playsinline src="VN20260423_193942.mp4">
                    Browser not supported.
                </video>
            </div>

            <!-- The Love Slider -->
            <div class="slider-container">
                <div class="slider-label">
                    <span>How much did you love it?</span>
                    <span id="percentage">0%</span>
                </div>
                <input type="range" id="loveSlider" min="0" max="100" value="0" oninput="updateSlider()">
            </div>

            <!-- FIXED WHATSAPP REACTION BUTTON -->
            <div id="reaction-btn-wrapper">
                <!-- Using the universal api.whatsapp.com link to guarantee it opens -->
                <a href="https://api.whatsapp.com/send?text=Oh%20my%20god,%20I%20just%20saw%20the%20video!%20It's%20so%20beautiful!%20%E2%9D%A4%EF%B8%8F%F0%9F%A5%BA" target="_blank" rel="noopener noreferrer" class="ios-btn btn-primary">
                    Send Reaction 💌
                </a>
            </div>

            <!-- FIXED SAVE VIDEO BUTTON -->
            <!-- target="_blank" ensures it opens properly on iPhones so she can save it -->
            <a href="VN20260423_193942.mp4" download="For_You.mp4" target="_blank" rel="noopener noreferrer" class="ios-btn btn-secondary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Open & Save Video
            </a>

        </div>
    </div>

    <!-- LOGIC -->
    <script>
        function startExperience() {
            const intro = document.getElementById('view-intro');
            const loading = document.getElementById('view-loading');
            const content = document.getElementById('view-content');
            const video = document.getElementById('mainVideo');

            intro.classList.remove('active-view');
            loading.classList.add('active-view');

            setTimeout(() => {
                loading.classList.remove('active-view');
                content.classList.add('active-view');
                video.play().catch(e => console.log("User tap required for video play"));
            }, 2000); 
        }

        function updateSlider() {
            const slider = document.getElementById('loveSlider');
            const percentage = document.getElementById('percentage');
            const btnWrapper = document.getElementById('reaction-btn-wrapper');
            
            percentage.innerText = slider.value + '%';

            if (slider.value == 100) {
                percentage.innerText = '100% ❤️';
                percentage.style.color = '#FF2D55';
                btnWrapper.classList.add('show');
            } else {
                percentage.style.color = 'rgba(235, 235, 245, 0.6)';
                btnWrapper.classList.remove('show');
            }
        }
    </script>
</body>
</html>
