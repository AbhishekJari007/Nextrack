<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise ❤️</title>
    
    <!-- Google Fonts for Elegant Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #4c0519 0%, #1e1b4b 50%, #020617 100%);
            color: white;
            margin: 0;
            overflow: hidden;
        }
        h1, h2 {
            font-family: 'Playfair Display', serif;
        }
        
        /* Magical Sparkle Animations */
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(225, 29, 72, 0.4); }
            50% { box-shadow: 0 0 60px rgba(225, 29, 72, 0.8); }
        }
        
        .sparkle {
            position: absolute;
            background: radial-gradient(circle, #fbbf24 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Smooth UI Transitions */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #intro, #surprise {
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Falling Sparkles Container -->
    <div id="sparkles-container" class="absolute inset-0 pointer-events-none z-0"></div>

    <div class="z-10 w-full max-w-md relative flex justify-center h-[85vh] items-center">
        
        <!-- ================= INTRO SCREEN ================= -->
        <div id="intro" class="absolute flex flex-col items-center space-y-10 opacity-100 scale-100 w-full">
            <div class="text-center space-y-3">
                <h1 class="text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-rose-300 via-pink-200 to-rose-300 drop-shadow-lg">
                    Hello Beautiful
                </h1>
                <p class="text-rose-200/80 font-light tracking-widest uppercase text-sm">
                    A special memory awaits
                </p>
            </div>

            <!-- Glowing Interactive Button -->
            <div class="relative group cursor-pointer mt-8" onclick="openSurprise()">
                <div class="absolute inset-0 bg-gradient-to-r from-rose-500 to-pink-600 rounded-full blur-2xl opacity-40 group-hover:opacity-70 transition duration-700 animate-pulse"></div>
                
                <button class="relative glass-panel p-10 rounded-full hover:scale-110 hover:-translate-y-2 transition-all duration-500 focus:outline-none" style="animation: pulse-glow 3s infinite;">
                    <!-- Elegant Heart Lock SVG -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="url(#rose-grad)" stroke-width="1.5" class="w-20 h-20 drop-shadow-[0_0_15px_rgba(251,113,133,0.5)]">
                        <defs>
                            <linearGradient id="rose-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#fda4af" />
                                <stop offset="100%" stop-color="#e11d48" />
                            </linearGradient>
                        </defs>
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        <circle cx="12" cy="10" r="2" fill="#fda4af"/>
                        <path d="M12 12v3" stroke="#fda4af" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            
            <p class="text-rose-300/60 font-medium tracking-[0.3em] uppercase text-xs mt-8 animate-bounce">
                Tap to Unlock
            </p>
        </div>

        <!-- ================= VIDEO REVEAL SCREEN ================= -->
        <div id="surprise" class="w-full glass-panel rounded-[2.5rem] shadow-[0_0_50px_rgba(0,0,0,0.5)] p-6 flex flex-col items-center space-y-6 opacity-0 translate-y-20 scale-95 pointer-events-none absolute border-t border-rose-500/30 border-l border-rose-500/30">
            
            <div class="text-center space-y-2 w-full pt-2">
                <h2 class="text-3xl italic text-transparent bg-clip-text bg-gradient-to-r from-rose-200 to-pink-100">
                    For You... ❤️
                </h2>
                <p class="text-sm text-rose-200/60 font-light tracking-wide">
                    "Whiskey or Vodka? Rehne do na nashe mein..."
                </p>
            </div>

            <!-- Premium Video Player Container (Phone-like proportions) -->
            <div class="w-full relative rounded-[1.5rem] overflow-hidden bg-black/40 aspect-[9/16] max-h-[55vh] flex items-center justify-center ring-1 ring-rose-500/30 shadow-[0_0_30px_rgba(225,29,72,0.15)]">
                <!-- IMPORTANT: The src here exactly matches your GitHub filename -->
                <video 
                    id="myVideo"
                    class="w-full h-full object-cover"
                    controls 
                    playsinline
                    src="VN20260423_193942.mp4"
                >
                    Your browser does not support the video tag.
                </video>
            </div>

            <!-- Elegant Download Button -->
            <div class="w-full pb-2">
                <a 
                    href="VN20260423_193942.mp4"
                    download="For_You.mp4"
                    class="w-full py-4 px-6 bg-white/10 hover:bg-white/20 border border-white/10 text-rose-100 rounded-2xl font-medium tracking-wide shadow-lg transform transition duration-300 hover:-translate-y-1 focus:outline-none flex items-center justify-center gap-3 backdrop-blur-md"
                >
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    Save to Gallery
                </a>
            </div>
        </div>

    </div>

    <!-- JavaScript for Animations and Logic -->
    <script>
        // Generate Falling Magical Sparkles
        const container = document.getElementById('sparkles-container');
        for (let i = 0; i < 40; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = `${Math.random() * 100}%`;
            
            // Random sizes between 2px and 6px
            const size = Math.random() * 4 + 2;
            sparkle.style.width = `${size}px`;
            sparkle.style.height = `${size}px`;
            
            // Random fall duration and delay
            const duration = Math.random() * 10 + 5;
            const delay = Math.random() * 10;
            
            sparkle.style.animation = `fall ${duration}s linear ${delay}s infinite`;
            
            // Make some sparkles rose-colored instead of gold
            if (Math.random() > 0.7) {
                sparkle.style.background = 'radial-gradient(circle, #fda4af 0%, transparent 70%)';
            }
            
            container.appendChild(sparkle);
        }

        // Open Surprise Logic
        function openSurprise() {
            const intro = document.getElementById('intro');
            const surprise = document.getElementById('surprise');
            const video = document.getElementById('myVideo');

            // Fade out intro
            intro.style.opacity = '0';
            intro.style.transform = 'scale(0.8) translateY(-20px)';
            intro.style.pointerEvents = 'none';

            // Fade in surprise card
            setTimeout(() => {
                surprise.style.opacity = '1';
                surprise.style.transform = 'translateY(0) scale(1)';
                surprise.style.pointerEvents = 'auto';
                surprise.classList.remove('absolute');
                intro.classList.add('hidden');
                
                // Play video automatically when revealed
                video.play().catch(e => console.log("Autoplay requires user interaction"));
            }, 800);
        }
    </script>
</body>
</html>
